name: CI-CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI (test + build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run server tests
        run: pnpm run test:server

      - name: Build client
        run: pnpm run build

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
    steps:
      - name: Validate deploy secrets
        run: |
          missing=()
          [ -n "$SERVER_HOST" ] || missing+=("SERVER_HOST")
          [ -n "$SERVER_USER" ] || missing+=("SERVER_USER")
          [ -n "$SERVER_PASSWORD" ] || missing+=("SERVER_PASSWORD")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required GitHub Actions secrets: ${missing[*]}"
            exit 1
          fi

      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Deploy and restart
        run: |
          export SSHPASS="$SERVER_PASSWORD"
          sshpass -e ssh -o StrictHostKeyChecking=accept-new -p "${SERVER_PORT:-22}" "${SERVER_USER}@${SERVER_HOST}" <<'EOF'
            set -euo pipefail
            cd /home/naruto/chatbot

            # Preserve runtime-generated store history before syncing code.
            backup_file=""
            if [ -f data/file-search-stores.json ]; then
              backup_file="/tmp/file-search-stores.json.bak.$(date +%s)"
              cp data/file-search-stores.json "$backup_file"
            fi

            git restore data/file-search-stores.json || true
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            if [ -n "$backup_file" ] && [ -f "$backup_file" ]; then
              cp "$backup_file" data/file-search-stores.json
            fi

            source ~/.nvm/nvm.sh
            pnpm install --frozen-lockfile
            pm2 restart chatbot
            curl -fsS http://127.0.0.1:3000/api/health
          EOF
